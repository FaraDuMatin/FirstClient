<!DOCTYPE html>
<html>
<head>
<style>
  .logo-container {
    display: flex;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    gap: 10px;
    cursor: pointer;
  }

  /* The Candle Shape */
  .candle {
    width: 20px;
    height: 40px;
    background: #fdf5e6;
    border-radius: 4px;
    position: relative;
    border: 1px solid #dcdcdc;
  }

  /* The Flame */
  .flame {
    width: 10px;
    height: 15px;
    background: #ffaa00;
    border-radius: 50% 50% 20% 20%;
    position: absolute;
    top: -15px;
    left: 5px;
    animation: flicker 1.5s infinite alternate;
  }

  /* Text Styling */
  .brand-name {
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 2px;
    color: #333;
    text-transform: uppercase;
  }

  /* Animation for the flame */
  @keyframes flicker {
    0% { transform: scale(1); opacity: 0.9; }
    100% { transform: scale(1.1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="logo-container">
  <div class="candle">
    <div class="flame"></div>
  </div>
  <div class="brand-name">Lumina</div>
</div>

</body>
</html>
